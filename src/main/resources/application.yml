spring:
  application:
    name: intranet-server

  # H2 Database (개발용)
  datasource:
    url: jdbc:h2:mem:intranetdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # Mail (Auth 이메일 인증)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # 파일 업로드 (info-board)
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

# JWT
jwt:
  secret: dcom-intranet-server-jwt-secret-key-must-be-long-enough-for-256-bits-security
  access-token-validity: 1800000
  refresh-token-validity: 1209600000

# 파일 업로드 경로 (info-board)
file:
  upload-dir: ./uploads/info